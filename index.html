<!DOCTYPE html>
<html lang="ja">

<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- PWA設定 -->
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#6a0dad">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="二次方程式.png" type="image/png">
  <title>二次方程式計算サイト</title>
</head>

<body>
  <div id="splash">
  <div class="terminal">
    <div id="bootText"></div>
  </div>
  <div>
    <h1>
      別にあんたのための二次方程式計算サイトじゃないんだからねっ！
    </h1>
  </div>
  <div>
    <h1>
      <math>
        <mi>a</mi>
        <msup>
          <mi>x</mi>
          <mn>2</mn>
        </msup>
        <mo>+</mo>
        <mi>b</mi>
        <mi>x</mi>
        <mo>+</mo>
        <mi>c</mi>
        <mo>=</mo>
        <mn>0</mn>
      </math>
    </h1>
  </div>
  <div>
    <h1>
      さぁ、ほらっ！適当な数字を入力しなさいよっ！
    </h1>
  </div>
  <div>
    <h1 id="answer">
    </h1>
  </div>
  <div>
    <h1>a:
      <input type="number" autocomplete="number" id="a" size="100" value="" placeholder="さぁ、ほらっ！aを入力しなさいよっ！">
    </h1>
  </div>
  <div>
    <h1>b:
      <input type="number" autocomplete="number" id="b" size="100" value="" placeholder="さぁ、ほらっ！bを入力しなさいよっ！">
    </h1>
  </div>
  <div>
    <h1>c:
      <input type="number" autocomplete="number" id="c" size="100" value="" placeholder="さぁ、ほらっ！cを入力しなさいよっ！">
    </h1>
  </div>
  <div>
    <h1>
      <input type="button" id="btn_submit" value="計算">
    </h1>
  </div>
  <div>
    <h1>
      <input type="button" id="clear" value="クリア">
    </h1>
  </div>
  <script src="script.js"></script>
  <script src="https://fred-wang.github.io/mathml-warning.js/mpadded-min.js"></script>
  <script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js')
      .then(() => console.log('SW登録成功'))
      .catch(err => console.log('SW登録失敗', err));
  }
  </script>
  <script>
const lines = [
  "HOS Boot Sequence Start...",
  "Checking System...",
  "Memory OK",
  "CPU OK",
  "Loading Modules...",
  "Sensor System ONLINE",
  "Pilot Authentication...",
  "ACCESS GRANTED",
  "Launching..."
];

const bootText = document.getElementById("bootText");

let i = 0;

function typeLine() {
  if (i < lines.length) {
    bootText.innerHTML += lines[i] + "\n";
    i++;
    setTimeout(typeLine, 200);
  } else {
    setTimeout(() => {
      document.getElementById("splash").classList.add("fade-out");
    }, 800);
  }
}

window.addEventListener("load", () => {
  typeLine();
});
</script>
</body>

</html>
